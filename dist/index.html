ль. Пленэр» в Алматы для любителей техники сухой пастели. Выставки: 2024 - 13-я выставка «Пересечения» Национального Союза Пастелистов г. Москва 2024 - «Городские метаморфозы» выставка городского пейзажа Art Society, ТД Dostyk Plaza, Алматы. 2024 - Выставка ботанической живописи, INECO FEST Первый Фестиваль «Инклюзия+Экология», Главный Ботанический сад. 2024 - «Эволюция цвета» Выставка-конкурс Национального Союза Пастелистов России. 2023 - «Город мечты» Ярмарка городского пейзажа ко Дню города Алматы в Музее искусств им. Кастеева. 2023 - «ART Road of Kazakhstan», Центральный Государственный музей. 2023 - Выставка-исследование Jusan Vibe: Алматинский салон. 2022 - Особое упоминание (Honorable Mention) и Специальная награда (Special Merit) в онлайн-выставкe Light&SpaceTime Art "4-th 555-summer", Санта-Фе, Нью-Мексико, США. 2022 - Онлайн-выставка Национального Союза Пастелистов России "Маршрут перестроен". 2021 - 7-я выставка "Пересечения" Национального Союза Пастелистов России, Москва, Россия. 2021- Финалист XV Международного фестиваля дикой природы "Золотая черепаха", категория "Портрет животного", Москва. 2021- Особое упоминание (Honorable Mention) и Специальное признание (Special Recognition) в онлайн-выставкe Light&SpaceTime Art"3rd 555-summer", июль,Санта-Фе,Нью-Мексико,США. 2021 - TOP 25. Финалист XV Международного фестиваля дикой природы "Золотая черепаха", категория "Портрет животного", Новая Третьяковка, Москва, Россия. 2020 - Победитель онлайн-выставки Национального Союза Пастелистов России "Дикая природа", "Золотой приз" в категории "Животные", Москва, Россия.',image:"/imported/members/01-svetlana-kushkova.jpeg"},{id:"member-02",name:"Какоткина Светлана",bio:"Коренная алматинка, закончила КазГАСА в 2002 г. по специальности дизайнер, позже получила диплом архитектора. Работала преподавателем в художественной школе, иллюстратором, дизайнером по рекламе, архитектором, сейчас веду мастер-классы по живописи, и пишу для удовольствия, потому что больше не могу не писать. Участвую в выставках, хожу на пленэры, наконец-то появилась возможность поставить живопись на первое место. Членство: с 2024 Ассоциированный член Национального Союза Пастелистов России Выставки: 2024 - Персональная выставка «Летний сон» в ЦВЗ музея им. Кастеева, г. Алматы. 2024 - Ежегодная онлайн-выставка Национального союза пастелистов России «Эволюция цвета» 2024 - Выставка ботанической живописи, INECO FEST Первый Фестиваль «Инклюзия+Экология», Главный Ботанический сад. 2024 - 2 сезон акварельного фестиваля в Астане «Течение времени». Коллективная выставка. Куратор Антропова Л. 2023 - «Арман қала/город мечты» Музей А.Кастеева. Куратор Нусип. А. 2023 - Коллективная выставка в галерее ART-Galaxy, посвященная городу Алматы. 2023 - Коллективная выставка в «Jusan Vibe». Кураторы: Веселова О., Серикпаев С. 2023 - «Зимняя сказка» коллективная выставка в галерее ART-Galaxy. 2022 Turksoy-Фонд « » издал книгу Олжаса Сулейменова, с иллюстрациями художников тюркского мира, в том числе и моими. - п 2021 «Заоконье» ерсональная выставка в ЦВЗ музея А.Кастеева. Куратор Нугуманова Ш. 2021 «Живые линии» ерсональная выставка в ЦВЗ музея А.Кастеева. Куратор Нугуманова Ш. - п 2002 Выставка учеников художественной школы «Best Consulting» в музее А.Кастеева. Преподаватели: Кузина Е.А., Какоткина С.В. - 2001 «Войлок в промышленном дизайне» Коллективная выставка в посольстве Франции. Куратор Бахмутов Ю.И. - 2001 «Кич» Коллективная выставка в галерее «Look». Кураторы выставки: Сабитов А.Р., Ибраева В., Буткеева Е.В. - 2000 Выставка учеников художественной школы «Best Consulting» в «Доме Дружбы народов». Преподаватели: Кузина Е.А., - Какоткина С.В Публикации посвященные выставкам “Егемен”, “МК в Казахстане”, “Express-K.kz”, Harper`s BAZAAR Kazakhstan, “The-Steppe.com”, “Kazpravda.kz” Также в эфире были заметки о выставках на канале HIT.TV и Хабар.",image:"/imported/members/02-kakotkina-svetlana.jpeg"},{id:"member-03",name:"Фидирко Анна",bio:"По образованию я художник, имею три художественных образования из них два высших. Но жизнь сложилась таким образом, что занятия живописью я возобновила спустя много лет после окончания художественно-графического факультета. Родилась в1977 г., Алматы, Казахстан. В настоящее время живу и работаю в Алматы. Профессиональный художник с многолетним творческим опытом, работаю в современной манере, а так же пишу в классической технике. Кроме пастели пишу маслом, акрилом на заказ выполняю росписи стен. Занимаюсь дизайном интерьера, работала иллюстратором, проектировщиком в строительной фирме и преподавателем живописи в школе. Образование: 2018 КазНПУ им.Абая 2003 КазГАСА 1996 Алма-Атинское художественное училище Выставки: 2020 - Персональная выставка «Магия города», галерея «ВЕРНИСАЖ», Алматы 2019 - Коллективная выставка «Юбилейная палитра», Центральный Государственный Музей РК Алматы. 2018 - Коллективная выставка «Тайны графического конструирования», галерея «ВЕРНИСАЖ», Алматы. 2002 - Коллективная выставка «Любовь не по паспорту», СОРОС. 2001 - Коллективная выставка «Фестиваль одноразовой одежды», музей «Умай», Алматы.",image:"/imported/members/03-fidirko-anna.jpeg"},{id:"member-04",name:"Ольга Иконникова",bio:"Родилась в 1960 г. в Алматы, Казахстан. В настоящее время пенсионер, живёт и работает в Алматы, Казахстан. Я непрофессиональный художник с13-летним опытом. Образование: 2016 - изостудия для взрослых ДХШ «Умай», руководитель Попова Е.И. 2011 - Изостудия руководитель Харченко Е.А. Выставки: 2024 - Юбилейная выставка ДХШ «Умай», Almaty Gallery 2015 - Выставка учеников и выпускников ДХШ «Умай» 2014 - Выставка учеников и выпускников ДХШ «Умай»",image:"/imported/members/04-olga-ikonnikova.jpeg"},{id:"member-05",name:"Семенова Елена",bio:"Родилась в1986 г. и по настоящее время живу и работаю в городе Алматы, Республика Казахстан. Основное направление в работах – анималистика. Живя в Алматы, я нахожу вдохновение в природе, животных и птицах этого удивительного региона. Начав изучать основы изобразительного искусства с детства в Классической Гимназии Искусств №46, продолжаю развивать свое мастерство через личный опыт и творчество. Выставки: 2024 - Участие в выставке посвященной празднику Наурыз «Бір Шаңырақ астында» 2023 - «Течение времени» - акварельный фестиваль при поддержке международного акварельного сообщества г. Астана. 2022 - Онлайн выставка Национального Союза Пастелистов «Маршрут перестроен». 2020 - Участие в выставке проекта Art For Planet при поддержке всемирного фонда дикой природы WWF, г. Москва. 2019 - Участие в выставке проекта Art For Planet при поддержке всемирного фонда дикой природы WWF, г. Москва.",image:"/imported/members/05-semenova-elena.jpeg"},{id:"member-06",name:"Батищева Кристина",bio:"Родилась в 1989 г. в Алматы, Казахстан. В настоящее время живу и работаю в Алматы, Казахстан. Образование: 2007 - 2011гг. Санкт Петербургский университет технологиии дизайна, факультет дизайна 2018 - Курс Елены Таткиной по пастели 2019 - Курс «Рисуем человека» Дарьи Остапенко 2021 - Курс Ирины Климовой по пастели Профессиональный опыт С 2020 г. пишу работы на заказ.",image:"/imported/members/06-batischeva-kristina.jpeg"},{id:"member-07",name:"Куралбаев Дамир",bio:"Родился в 1984, г. Жетысай, Казахстан. В настоящее время живу в г Алматы работаю в Алматинском колледже декоративно-прикладного искусства им О. Тансыкбаева. Обучался живописи у таких педагогов АКДПИ как Бахтыгереев А., Дуйсенбаева К. и Оскенбай М. Коллективные выставки 2024 - «Ұстаз жаққан шамшырақ» АКДПИим О. Тансыкбаева, г. Алматы. 2023 - «Өмір-Өнер» АКДПИим О. Тансыкбаева, г. Алматы. 2022 - «Красное» организатор: Яблоневая палитра. 2021 - «Тəуелсіздік ырғағы» АКДПИим О. Тансыкбаева, г. Алматы. 2018 - «Колыбель тюркского мира» Государственный музей искусств им. А.Кастеева, г. Алматы.",image:"/imported/members/07-kuralbaev-damir.jpeg"},{id:"member-08",name:"Наталья Молокотина",bio:"Родилась в 1973 г., г. Шевченко, КазССР. В настоящее время живу и работаю в г. Актау, Республика Казахстан. Художник любитель. 1991 –1997. г Актауский университет им. Академика Ш.Е. Есенова Квалификация Экономист, специальность: Бизнес и менеджмент.: 2007-2009 гг. обучение в студии живописи «Пристань», г. Актау, у художника Ермаковой И. (масло, акрил) Частные уроки у удожников: Сергей Усик, Ирина Климова. (сухая пастель) Членство: С 2019 года ассоциированный член Национального Союза Пастелистов России С 2022 года членство в АРОО «Рисую Астрахань» Выставки: 2022 - выставка художественных работ «Астрахань-Времена года» 2022 - участие в конкурсе художников «Астрахань купеческая» 2022 - Выставка Национального союза Пастелистов России «Маршрут перестроен» 2021 - 6-я Выставка Национального союза Пастелистов России «Летний онлайн проект» 2021 - областная выставка астраханских художников «Пятое время года» г. Астрахань. 2021 - коллективная выставка художественных работ в Музее культуры г. Астрахань 2019 - онлайн выставка Национального союза Пастелистов России",image:"/imported/members/08-natalya-molokotina.jpeg"},{id:"member-09",name:"Светлана Кравченко",bio:'В возрасте 55 лет после успешной карьеры инженера, антимонопольщика и страховщика я приняла решение стать художником, о чем мечтала всю сознательную жизнь. Начала с образования в художественной школе, затем брала многочисленные онлайн курсы и занятия с преподавателем, что позволило мне реализовать свою страсть к творчеству. Стремлюсь запечатлеть красоту казахстанской природы, включая величественные горы, живописные озера, поля и леса. Образование: 1977-1983 г. Инженер-механик, Ленинградский Кораблестроительный Институт 2015 г. ДХШ «Умай» Членство: С 2019 года ассоциированный член Национального Союза Пастелистов России Выставки: 2024 - Выставки ДХШ «УМАЙ» в Almaty Gallery, г. Алматы. 2024 - «Эволюция цвета» Выставка-конкурс Национального Союза Пастелистов России. 2023 - выставка Национального Союза Пастелистов России "Зона устойчивости". 2022 - онлайн-выставка Национального Союза Пастелистов России "Маршрут перестроен". 2021 - 7-я выставка "Пересечения" Национального Союза Пастелистов России, Москва, Россия. 2020 - Выставки ДХШ «УМАЙ» в Музее Алматы. 2019 - Выставка "Между линией и цветом" Национального Союза Пастелистов России, Москва, Россия.',image:"/imported/members/09-svetlana-kravchenko.jpeg"},{id:"member-10",name:"Хакимжанова Айгуль",bio:"Родилась в 09.02.1962 г., г. Алматы, с1988 г. - преподаватель КазНАИ им. Жургенова. Закончила в1984 г. КазПИ им. Абая художественно-графический факультет. Членство: 2003 - член Союза Художников РК 2002 - объединение художников графиков РК 1995 - член объединения молодых художников Казахстана Выставки: с 1995 г. участник Республиканских выставок Ежегодные отчетные выставки Союза художников РК Всего различных выставок, в том числе международных и персональных, более 30 2017 - Международный художественный конкурс Art Portrait Club г.Москва. Диплом за 2-е место. 2017 - Иллюстрации к книге «Поэма о Наргиз» автор поэмы Первый секретарь ЦК КП Узбекистана Рашидов Ш.Р. 2015 - автор сценария и художник постановщик мультипликационного трейлера посвященного 550-летию КазахскомуХанству 2015 - иллюстрации в опубликованной книге «Волшебные сны Данияла» Жан Амани. 2014 - иллюстрации в опубликованной книге «Боги срединного моря» Г.Долгая издание г. Лондон. 2013 -творческие работы вошли в книгу «Каталог художников Казахстана» г. Москва 2012 - Лауреат Международного книжного форума-фестиваля «Open Central Asia Book Forum & Literature Festival 2012, in Bishkek, Kyrgyzstan». 1 место в номинации «Иллюстрирование». 2011 - творческие работы вошли в книгу «Художники Казахстана за годы независимости». Член Жюри Международных выставок «Самгау» при КазНАИ им. Т. Жургенова 2018-2023гг. Картины находятся в фонде музеев ГМИ им. А. Кастеева г. Алматы, НМРК г. Астана, Музей им. М.А. Врубеля г. Омск. -.",image:"/imported/members/10-hakimzhanova-aygul.jpeg"},{id:"member-11",name:"Альмира Сластинова",bio:"Родилась в 1985 г., Алматинская область, село Маловодное. В настоящее время живу в г. Алматы. Творчество для меня — это не просто работа или хобби, а стиль жизни и способ увидеть мир под новым углом. Меня всегда привлекала сила самовыражения и поиск неожиданных решений. Мой путь в искусство не начался в академических стенах, а рос через глубокий личный интерес к форме, цвету и эмоциям. Я убеждена, что истинное искусство живет в чувстве и интуиции, которые мы вкладываем в каждую работу. Образование: 1992-1999 «Школа фортепиано»: 2002-2007 Алматинский Технологический Университет по специальности инженер-технолог бродильных производств и виноделия Курсы 2023 - Пастель. Рисовать может каждый 2020 - Образовательная платформа «Skillbox» «Основы рисунка» 2020 - Школа скетчинга и рисования 2011 - «Маркетинг и продажи 2010 -. «Теле-радио ведущие» Профессиональный опыт 2018 - наст. время: Художник-фрилансер-Создание авторских арт-объектов и визуальных инсталляций для частных и коммерческих интерьеров. - Индивидуальные заказы на картины и дизайнерские проекты для жилых и коммерческих пространств.",image:"/imported/members/11-almira-slastinova.jpeg"},{id:"member-12",name:"Трофимович Виктория",bio:"Родилась в Казахстане, живу и работаю в Алматы. По профессии юрист, а рисование всегда сопровождало меня, как дело моей души. Училась самостоятельно-брала уроки для взрослых в ДХШ «Умай» у художника и педагога Поповой Е.И., проходила обучение в разных онлайн школах рисования. Учусь у лучших современных мастеров пастелистов: Владислава Татаринова, Ирины,Климовой, Елены Таткиной, Ольги Абрамовой. Всегда было интересно пробовать себя в самых разных направлениях и жанрах: графика и живопись, натюрморты и пейзажи. В технике сухой пастели работаю с 2006 года, эти цветные мелки покорили мое сердце навсегда. Занимаюсь продвижением пастельной живописи в Казахстане. Работы находятся в частных коллекциях в Казахстане, России, Южной Корее и Австралии. Членство: Ассоциированный член Национального союза пастелистов России с 2024 года Выставки: 2024 -13-явыставка Национального союза пастелистов России «Пересечения», г. Москва 2024 - Юбилейная выставка ДХШ «Умай» 2022 - Коллективная выставка в Музее 2021 - Выставка «Созвучие», частная галерея г. Алматы 2021 - «6-я выставка Национального союза пастелистов. Летний онлайн проект» 2012 - Выставка учеников и выпускников ДХШ «Умай»",image:"/imported/members/12-trofimovich-viktoriya.jpeg"}],vc=[{id:"catalog-001",title:"Чарынский каньон",author:"Светлана Кушкова",image:"/imported/works/001-svetlana-kushkova.jpeg",description:"50х65"},{id:"catalog-002",title:"Невозвратное",author:"Светлана Кушкова",image:"/imported/works/002-svetlana-kushkova.jpeg",description:"65х50"},{id:"catalog-003",title:"Назарбаева-Кабанбай батыра, двор",author:"Светлана Кушкова",image:"/imported/works/003-svetlana-kushkova.jpeg",description:"32х24"},{id:"catalog-004",title:"Медуза",author:"Светлана Кушкова",image:"/imported/works/004-svetlana-kushkova.jpeg",description:"32х24"},{id:"catalog-005",title:"Морская звезда",author:"Светлана Кушкова",image:"/imported/works/005-svetlana-kushkova.jpeg",description:"32х24"},{id:"catalog-006",title:"Морской конек",author:"Светлана Кушкова",image:"/imported/works/006-svetlana-kushkova.jpeg",description:"32х24"},{id:"catalog-007",title:"Морской рак -богомол",author:"Светлана Кушкова",image:"/imported/works/007-svetlana-kushkova.jpeg",description:"32х24"},{id:"catalog-008",title:"Грация гиппопотама",author:"Светлана Кушкова",image:"/imported/works/008-svetlana-kushkova.jpeg",description:"30×40"},{id:"catalog-009",title:"Река Чарын. Диптих",author:"Светлана Кушкова",image:"/imported/works/009-svetlana-kushkova.jpeg",description:"80х40"},{id:"catalog-010",title:"Панорамный вид на город с горы Кок-Тюбе",author:"Светлана Кушкова",image:"/imported/works/010-svetlana-kushkova.jpeg",description:"40х70"},{id:"catalog-011",title:"Кайракский водопад",author:"Светлана Кушкова",image:"/imported/works/011-svetlana-kushkova.jpeg",description:"86х42"},{id:"catalog-012",title:"Дедушкина библиотека",author:"Светлана Куш
